<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Deploy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --accent: #34d399;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }

        .progress-line-active {
            position: absolute;
            top: 20px;
            left: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
            z-index: 1;
            width: 0%;
        }

        .step-indicator {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #0f172a;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            z-index: 2;
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .step-indicator.completed {
            background: var(--primary);
            border-color: var(--primary);
            color: #064e3b;
        }

        /* Form Steps */
        .step-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            color: var(--text-muted);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-item input {
            width: auto;
            accent-color: var(--primary);
        }

        .env-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .env-row {
            display: flex;
            gap: 10px;
        }

        .env-item {
            flex: 1;
        }

        .env-row button {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: none;
            border-radius: 10px;
            width: 38px;
            cursor: pointer;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 16px;
        }

        .btn-nav {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 1rem;
        }

        .btn-prev {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .btn-next {
            background: var(--primary);
            color: #064e3b;
        }

        .btn-nav:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* Review Summary */
        .review-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .review-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .review-label {
            color: var(--text-muted);
        }

        .review-value {
            color: var(--text);
            font-weight: 500;
            text-align: right;
        }

        #status {
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            font-size: 0.9rem;
            display: none;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes rotation {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Welcome Screen */
        #welcomeScreen {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .project-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-item:hover {
            background: rgba(16, 185, 129, 0.05);
            border-color: var(--primary);
        }

        .project-info h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--text);
        }

        .project-info p {
            margin: 4px 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Error UI */
        .error-container {
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .error-header {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
        }

        .error-body {
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            display: none;
        }

        .error-body.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Go-Deploy</h1>
        <p class="subtitle" id="mainSubtitle">Build and package your Go applications into installer-ready desktop
            distributions.</p>

        <!-- Welcome Screen -->
        <div id="welcomeScreen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <label style="margin: 0;">Recent Projects</label>
            </div>
            <div id="projectList" class="project-list">
                <!-- Populated by JS -->
            </div>
            <button class="btn-nav btn-next" style="margin-top: 32px; width: 100%;" onclick="startNewProject()">+ Create
                New Build</button>
        </div>

        <!-- Progress Container (Hidden on welcome and status) -->
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-line"></div>
            <div class="progress-line-active" id="progressLine"></div>
            <div class="step-indicator active" id="ind-1">1</div>
            <div class="step-indicator" id="ind-2">2</div>
            <div class="step-indicator" id="ind-3">3</div>
            <div class="step-indicator" id="ind-4">4</div>
        </div>

        <form id="buildForm" style="display: none;">
            <!-- Step 1: Project Info -->
            <div class="step-content active" id="step-1">
                <div class="form-group">
                    <label>Source Directory</label>
                    <div class="input-group">
                        <input type="text" id="sourceDir" placeholder="/abs/path/to/go/project" required>
                        <button type="button" class="btn-secondary" onclick="browseSource()">Browse</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Destination Directory</label>
                    <div class="input-group">
                        <input type="text" id="outputDir" placeholder="./builds">
                        <button type="button" class="btn-secondary" onclick="browseOutput()">Browse</button>
                    </div>
                </div>
            </div>

            <!-- Step 2: Branding & Info -->
            <div class="step-content" id="step-2">
                <div class="form-group">
                    <label>App Name</label>
                    <input type="text" id="displayName" placeholder="e.g., My Awesome App">
                </div>
                <div class="form-group">
                    <label>Version</label>
                    <input type="text" id="version" value="1.0.0">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="A brief description..."></textarea>
                </div>
                <div class="form-group">
                    <label>Browser URL (Optional)</label>
                    <input type="text" id="browserURL" placeholder="http://localhost:8080">
                </div>
            </div>

            <!-- Step 3: Deliverables & Environment -->
            <div class="step-content" id="step-3">
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">
                        <span
                            style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; color: var(--text-muted);">Deliverables</span>
                        <label
                            style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; cursor: pointer; color: var(--accent); text-transform: none; font-weight: 500;">
                            <input type="checkbox" id="selectAllDeliverables"
                                onchange="toggleAllDeliverables(this.checked)" style="width: auto; margin: 0;"> Select
                            All
                        </label>
                    </div>
                    <div class="checkbox-grid" id="deliverableGrid" style="grid-template-columns: 1fr; gap: 8px;">
                        <div style="color: var(--text-muted); font-size: 0.7rem; margin-top: 8px; margin-bottom: 4px;">
                            MACOS</div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="darwin"
                                    data-arch="arm64" data-format="dmg"> Apple Silicon (.dmg)</label>
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="darwin"
                                    data-arch="amd64" data-format="dmg"> Intel Mac (.dmg)</label>
                        </div>

                        <div style="color: var(--text-muted); font-size: 0.7rem; margin-top: 12px; margin-bottom: 4px;">
                            WINDOWS</div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="windows"
                                    data-arch="amd64" data-format="exe"> Windows x64 (.exe)</label>
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="windows"
                                    data-arch="amd64" data-format="binary"> Windows x64 Binary</label>
                        </div>

                        <div style="color: var(--text-muted); font-size: 0.7rem; margin-top: 12px; margin-bottom: 4px;">
                            LINUX (DEBIAN / UBUNTU)</div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="amd64" data-format="deb"> Linux x64 (.deb)</label>
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="arm64" data-format="deb"> Linux ARM64 (.deb)</label>
                        </div>

                        <div style="color: var(--text-muted); font-size: 0.7rem; margin-top: 12px; margin-bottom: 4px;">
                            LINUX (FEDORA / RHEL)</div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="amd64" data-format="rpm"> Linux x64 (.rpm)</label>
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="arm64" data-format="rpm"> Linux ARM64 (.rpm)</label>
                        </div>

                        <div style="color: var(--text-muted); font-size: 0.7rem; margin-top: 12px; margin-bottom: 4px;">
                            RASPBERRY PI & OTHERS</div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="arm64" data-format="zip"> Pi ARM64 (.zip)</label>
                            <label class="checkbox-item"><input type="checkbox" name="deliverable" data-os="linux"
                                    data-arch="arm" data-format="binary"> Pi ARMhf Binary</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Environment Variables</label>
                    <div id="envList" class="env-list"></div>
                    <div style="display: flex; gap: 10px; margin-top: 12px;">
                        <button type="button" class="btn-secondary" style="flex: 2; padding: 12px;"
                            onclick="addEnvRow()">+ Add</button>
                        <button type="button" class="btn-secondary" style="flex: 1; padding: 12px;"
                            onclick="loadEnvFile()">Load .env</button>
                    </div>
                </div>
            </div>

            <!-- Step 4: Review & Build -->
            <div class="step-content" id="step-4">
                <div class="form-group">
                    <label>Default Run Mode</label>
                    <select id="defaultMode">
                        <option value="service">Service (Auto-Install)</option>
                        <option value="standalone">Standalone (Run Once)</option>
                    </select>
                </div>
                <div class="review-card">
                    <div class="review-item">
                        <span class="review-label">App Name:</span>
                        <span class="review-value" id="rev-display">-</span>
                    </div>
                    <div class="review-item">
                        <span class="review-label">Targets:</span>
                        <span class="review-value" id="rev-target">-</span>
                    </div>
                    <button type="button" class="btn-secondary" style="width: 100%; margin-top: 16px;"
                        onclick="previewConfig()">Preview Config JSON</button>
                </div>
            </div>

            <div class="nav-buttons">
                <button type="button" class="btn-nav btn-prev" id="btnPrev" style="display: none;"
                    onclick="changeStep(-1)">Back</button>
                <button type="button" class="btn-nav btn-next" id="btnNext" onclick="changeStep(1)">Next Step</button>
                <button type="submit" class="btn-nav btn-next" id="btnSubmit" style="display: none;">Build
                    Release</button>
            </div>
        </form>

        <!-- Step 5: Status Screen -->
        <div id="statusScreen" style="display: none; animation: fadeIn 0.4s ease;">
            <div id="statusIcon" style="font-size: 4rem; text-align: center; margin-bottom: 24px;"></div>
            <h2 id="statusTitle" style="text-align: center; margin-bottom: 8px;"></h2>
            <p id="statusMsg" style="text-align: center; color: var(--text-muted); margin-bottom: 32px;"></p>

            <div id="errorUI" class="error-container" style="display: none;">
                <div class="error-header" onclick="toggleError()">
                    <span>Error Details</span>
                    <span id="errorChevron">▼</span>
                </div>
                <div id="errorBody" class="error-body"></div>
            </div>

            <div class="nav-buttons" style="margin-top: 40px;">
                <button class="btn-nav btn-prev" id="btnStatusBack" onclick="changeStep(-4)">Back to Edit</button>
                <button class="btn-nav btn-next" id="btnOpenFolder" style="display: none;"
                    onclick="openOutputFolder()">Open Folder</button>
                <button class="btn-nav btn-next" id="btnDone" onclick="location.reload()">Done</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let lastBuildPath = "";

        window.onload = async () => {
            const projects = await window.getRecentProjects();
            const list = document.getElementById('projectList');
            if (projects && projects.length > 0) {
                projects.sort((a, b) => b.UpdatedAt - a.UpdatedAt);
                list.innerHTML = projects.slice(0, 5).map(p => `
                    <div class="project-item" onclick="loadProject('${btoa(JSON.stringify(p))}')">
                        <div class="project-info">
                            <h3>${p.Name || 'Unnamed'}</h3>
                            <p>${p.ID}</p>
                        </div>
                        <span style="color: var(--text-muted); font-size: 0.8rem;">${new Date(p.UpdatedAt * 1000).toLocaleDateString()}</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">No recent projects found.</p>';
            }
        };

        function startNewProject() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'flex';
            document.getElementById('buildForm').style.display = 'block';
            addEnvRow();
        }

        function loadProject(encoded) {
            const p = JSON.parse(atob(encoded));
            startNewProject();
            document.getElementById('sourceDir').value = p.ID;
            document.getElementById('outputDir').value = p.OutputDir || "";
            document.getElementById('displayName').value = p.Name || "";
            document.getElementById('version').value = p.Version || "1.0.0";
            document.getElementById('description').value = p.Description || "";
            document.getElementById('browserURL').value = p.BrowserURL || "";
            document.getElementById('defaultMode').value = p.DefaultMode || "service";

            // Env
            const envList = document.getElementById('envList');
            envList.innerHTML = '';
            if (p.BuildEnv) {
                for (let k in p.BuildEnv) addEnvRow(k, p.BuildEnv[k]);
            }
            if (envList.children.length === 0) addEnvRow();

            // Formats/OS
            document.querySelectorAll('input[name="deliverable"]').forEach(cb => {
                const os = cb.dataset.os;
                const arch = cb.dataset.arch;
                const format = cb.dataset.format;

                const hasTarget = p.Targets && p.Targets.some(t => t.OS === os && t.Arch === arch);
                const hasFormat = p.Formats && p.Formats.includes(format);

                cb.checked = !!(hasTarget && hasFormat);
            });

            // Update Review Screen
            const selectedText = Array.from(document.querySelectorAll('input[name="deliverable"]:checked'))
                .map(cb => cb.parentElement.innerText.trim()).join(', ');
            document.getElementById('rev-target').innerText = selectedText || 'None selected';
            document.getElementById('rev-display').innerText = p.Name || 'Auto-detected';
        }

        async function browseSource() {
            const path = await window.selectFolder();
            if (path) {
                document.getElementById('sourceDir').value = path;
                const info = await window.getProjectInfo(path);
                if (info) {
                    if (!document.getElementById('displayName').value) document.getElementById('displayName').value = info.name;
                    if (!document.getElementById('version').value) document.getElementById('version').value = info.version;
                }
            }
        }

        async function browseOutput() {
            const path = await window.selectFolder();
            if (path) document.getElementById('outputDir').value = path;
        }

        async function loadEnvFile() {
            const path = await window.selectFile();
            if (path) {
                const env = await window.loadEnv(path);
                for (let k in env) addEnvRow(k, env[k]);
            }
        }

        function toggleError() {
            const body = document.getElementById('errorBody');
            const chevron = document.getElementById('errorChevron');
            body.classList.toggle('show');
            chevron.innerText = body.classList.contains('show') ? '▲' : '▼';
        }

        function changeStep(dir) {
            if (dir > 0) {
                const activeStep = document.getElementById(`step-${currentStep}`);
                const inputs = activeStep.querySelectorAll('input[required]');
                for (let input of inputs) if (!input.value.trim()) { alert(`Please fill in: ${input.placeholder || input.id}`); return; }
            }

            document.getElementById(`step-${currentStep}`).classList.remove('active');
            document.getElementById(`ind-${currentStep}`).classList.remove('active');
            if (dir > 0) document.getElementById(`ind-${currentStep}`).classList.add('completed');

            currentStep += dir;
            if (currentStep < 1) { location.reload(); return; }

            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById(`ind-${currentStep}`).classList.add('active');
            document.getElementById('progressLine').style.width = ((currentStep - 1) / 3 * 100) + '%';
            document.getElementById('btnPrev').style.display = currentStep > 1 ? 'block' : 'none';
            document.getElementById('btnNext').style.display = currentStep < 4 ? 'block' : 'none';
            document.getElementById('btnSubmit').style.display = currentStep === 4 ? 'block' : 'none';

            if (currentStep === 4) {
                document.getElementById('rev-display').innerText = document.getElementById('displayName').value || 'Auto-detected';
                const selected = Array.from(document.querySelectorAll('input[name="deliverable"]:checked')).map(cb => cb.parentElement.innerText.trim()).join(', ');
                document.getElementById('rev-target').innerText = selected || 'None selected';
            }
        }

        function addEnvRow(k = "", v = "") {
            const div = document.createElement('div');
            div.className = 'env-row';
            div.innerHTML = `<input type="text" placeholder="Key" value="${k}"> <input type="text" placeholder="Value" value="${v}"> <button type="button" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById('envList').appendChild(div);
        }

        function getFormData() {
            const env = {};
            document.querySelectorAll('.env-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value) env[inputs[0].value] = inputs[1].value;
            });

            const deliverables = Array.from(document.querySelectorAll('input[name="deliverable"]:checked'));
            const targets = [];
            const formats = new Set();

            deliverables.forEach(cb => {
                const os = cb.dataset.os;
                const arch = cb.dataset.arch;
                const format = cb.dataset.format;

                formats.add(format);

                if (os === "all") {
                    ["darwin", "windows", "linux"].forEach(o => {
                        targets.push({ OS: o, Arch: "amd64" });
                        targets.push({ OS: o, Arch: "arm64" });
                    });
                } else {
                    targets.push({ OS: os, Arch: arch });
                }
            });

            // De-duplicate targets
            const uniqueTargets = [];
            const seen = new Set();
            targets.forEach(t => {
                const key = `${t.OS}-${t.Arch}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueTargets.push(t);
                }
            });

            return {
                SourceDir: document.getElementById('sourceDir').value,
                OutputDir: document.getElementById('outputDir').value,
                BuildEnv: env,
                Name: document.getElementById('displayName').value,
                Description: document.getElementById('description').value,
                Version: document.getElementById('version').value,
                BrowserURL: document.getElementById('browserURL').value,
                Targets: uniqueTargets,
                DefaultMode: document.getElementById('defaultMode').value,
                Formats: Array.from(formats)
            };
        }

        function previewConfig() {
            alert(JSON.stringify(getFormData(), null, 2));
        }

        function toggleAllDeliverables(checked) {
            document.querySelectorAll('input[name="deliverable"]').forEach(cb => {
                cb.checked = checked;
            });
        }

        function showStatus(data) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('buildForm').style.display = 'none';
            const statusScreen = document.getElementById('statusScreen');
            statusScreen.style.display = 'block';

            const container = document.getElementById('statusContainer');
            container.innerHTML = '';

            const header = document.createElement('h2');
            header.innerText = data.success ? 'Build Summary' : 'Build Failed';
            header.style.color = data.success ? 'var(--accent)' : '#ff5252';
            container.appendChild(header);

            const msg = document.createElement('p');
            msg.innerText = data.message;
            msg.style.marginBottom = '20px';
            container.appendChild(msg);

            if (data.results && data.results.length > 0) {
                const table = document.createElement('table');
                table.style.width = '100%';
                table.style.borderCollapse = 'collapse';
                table.style.marginBottom = '20px';
                table.style.fontSize = '0.9rem';

                data.results.forEach(res => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid var(--border)';

                    const tdTarget = document.createElement('td');
                    tdTarget.innerText = res.target;
                    tdTarget.style.padding = '12px 8px';

                    const tdStatus = document.createElement('td');
                    tdStatus.innerText = res.status.toUpperCase();
                    tdStatus.style.padding = '12px 8px';
                    tdStatus.style.textAlign = 'right';
                    tdStatus.style.color = res.status === 'success' ? 'var(--accent)' : '#ff5252';

                    tr.appendChild(tdTarget);
                    tr.appendChild(tdStatus);
                    table.appendChild(tr);

                    if (res.error) {
                        const trErr = document.createElement('tr');
                        const tdErr = document.createElement('td');
                        tdErr.colSpan = 2;
                        tdErr.innerHTML = `<div style="padding: 8px; background: rgba(255,82,82,0.1); border-radius: 4px; font-family: monospace; font-size: 0.8rem; color: #ff8a80; margin-bottom: 12px;">${res.error}</div>`;
                        trErr.appendChild(tdErr);
                        table.appendChild(trErr);
                    }
                });
                container.appendChild(table);
            }

            const actions = document.createElement('div');
            actions.className = 'actions';
            actions.style.display = 'flex';
            actions.style.gap = '12px';

            if (data.success) {
                const btnOpen = document.createElement('button');
                btnOpen.className = 'btn-primary';
                btnOpen.innerText = 'Open Folder';
                btnOpen.onclick = () => window.openFolder(data.outputDir);
                actions.appendChild(btnOpen);
            }

            const btnDone = document.createElement('button');
            btnDone.className = data.success ? 'btn-secondary' : 'btn-primary';
            btnDone.innerText = data.success ? 'Done' : 'Try Again';
            btnDone.onclick = () => location.reload();
            actions.appendChild(btnDone);

            container.appendChild(actions);
        }

        async function submitBuild() {
            console.log("Submitting build...");
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'Building...';

            try {
                const config = getFormData();
                console.log("Config:", config);
                if (config.Targets.length === 0) { alert("Please select at least one deliverable."); btn.disabled = false; btn.innerText = 'Build Release'; return; }

                const resp = await fetch('/api/build', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const data = await resp.json();
                console.log("Response:", data);
                showStatus(data);
            } catch (e) {
                console.error("Build failed:", e);
                showStatus({ success: false, message: 'Critical Error: ' + e.message, results: [] });
            } finally {
                btn.disabled = false;
                btn.innerText = 'Build Release';
            }
        }

        document.getElementById('buildForm').onsubmit = async (e) => {
            e.preventDefault();
            await submitBuild();
        };
    </script>
</body>

</html>
